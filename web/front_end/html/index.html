<!doctype html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta
        http-equiv="Cache-Control"
        content="
            no-cache,
            no-store,
            must-revalidate
        "
    >

    <meta
        http-equiv="Pragma"
        content="no-cache"
    >

    <meta
        http-equiv="Expires"
        content="0"
    >

    <meta
        name="viewport"
        content="
        width=device-width,
        initial-scale=1,
        user-scalable=no
        "
    >

    <title>
        AiGen Store
    </title>

    <link
        rel="stylesheet"
        href="/static/css/global.css"
    >

    <link
        rel="stylesheet"
        href="/static/css/home.css"
    >

    <link
        rel="stylesheet"
        href="/static/css/products.css"
    >

    <link
        rel="stylesheet"
        href="/static/css/orders.css"
    >

    <link
        rel="stylesheet"
        href="/static/css/broadcast.css"
    >

    <link
        rel="stylesheet"
        href="/static/css/settings.css"
    >

    <link
        rel="stylesheet"
        href="/static/css/notifications.css"
    >

    <link
        rel="stylesheet"
        href="/static/css/auth.css"
    >

</head>


<body>

    <div
        id="toast-container"
    ></div>


    <section
        id="loginPage"
        class="auth-container"
        style="display:none"
    >

        <form
            id="loginForm"
            class="login-form"
        >

            <h2>
                Admin Login
            </h2>

            <div
                class="input-wrapper"
            >

                <span
                    class="input-icon"
                >
                    👤
                </span>

                <input
                    type="text"
                    id="username"
                    placeholder="Username"
                    required
                >

            </div>


            <div
                class="
                input-wrapper
                password-container
                "
            >

                <span
                    class="input-icon"
                >
                    🔑
                </span>

                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    required
                >

                <button
                    type="button"
                    id="togglePassword"
                    class="
                    toggle-password
                    "
                >
                    👁️
                </button>

            </div>


            <button
                type="submit"
            >
                Login
            </button>

        </form>

    </section>


    <section
        id="mainApp"
        style="display:none"
    >

        <header
            class="header"
        >

            <button
                id="profileBtn"
                class="header-btn"
            >
                👤
            </button>

            <h1
                id="pageTitle"
                class="header-title"
            >
                🏠 Home
            </h1>

            <button
                id="notifBtn"
                class="header-btn"
                style="
                position:relative
                "
            >

                🔔

                <span
                    id="notifBadge"
                    class="
                    notif-badge
                    "
                    style="
                    display:none
                    "
                >
                    0
                </span>

            </button>

        </header>


        <nav
            id="tabBar"
            class="tab-bar"
        ></nav>


        <main
            id="content"
            class="content"
        >

            <section
                class="placeholder"
            >

                <p>
                    🔄 Memuat...
                </p>

            </section>

        </main>


        <nav
            class="bottom-nav"
        >

            <button
                class="bottom-item"
                data-page="broadcast"
            >
                📣
            </button>

            <button
                class="bottom-item"
                data-page="products"
            >
                📂
            </button>

            <button
                class="
                bottom-item
                active
                "
                data-page="home"
            >
                🏠
            </button>

            <button
                class="bottom-item"
                data-page="orders"
            >
                📦
            </button>

            <button
                class="bottom-item"
                data-page="settings"
            >
                ⚙️
            </button>

        </nav>

    </section>


    <script src="/static/js/auth.js"></script>

    <script src="/static/js/app.js"></script>

    <script src="/static/js/home.js"></script>

    <script src="/static/js/orders.js"></script>

    <script src="/static/js/products.js"></script>

    <script src="/static/js/broadcast.js"></script>

    <script src="/static/js/settings.js"></script>

    <script src="/static/js/profile.js"></script>

    <script src="/static/js/notifications.js"></script>

</body>

</html>
